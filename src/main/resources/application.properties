spring.application.name=education-library
server.port=${PORT:8082}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:h2}
spring.config.import=optional:file:./.env[.properties],optional:file:./backend/.env[.properties],optional:file:../.env[.properties]

# Default database configuration - local development uses H2 unless SPRING_PROFILES_ACTIVE=mysql is supplied.
spring.datasource.url=${H2_DATABASE_URL:jdbc:h2:file:./data/education_library;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.open-in-view=false


# Email Service Configuration (Optional - will be disabled if credentials not provided)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
spring.mail.password=${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
spring.mail.properties.mail.smtp.auth=${SPRING_MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=15000
spring.mail.properties.mail.smtp.timeout=15000
spring.mail.properties.mail.smtp.writetimeout=15000
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:false}

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
jwt.secret=${JWT_SECRET:education-library-2026-secure-jwt-signing-key-32chars}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:5173}
app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:${MAIL_USERNAME:no-reply@educate.local}}}
app.mail.admin-email=${APP_ADMIN_EMAIL:${SPRING_MAIL_USERNAME:${MAIL_USERNAME:admin@educate.local}}}
app.storage.upload-dir=${UPLOAD_DIR:uploads}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
app.security.admin-secret=${ADMIN_SECRET:ADMIN2026}

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.resolve-lazily=true
server.tomcat.max-swallow-size=500MB
server.tomcat.connection-timeout=600000

# Swagger / OpenAPI UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
