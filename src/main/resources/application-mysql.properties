# Activate this profile in production with SPRING_PROFILES_ACTIVE=mysql
spring.datasource.url=${SPRING_DATASOURCE_URL:${MYSQL_URL:${DATABASE_URL:jdbc:mysql://localhost:3306/education_library?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${MYSQLUSER:${DB_USERNAME:root}}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${MYSQLPASSWORD:${DB_PASSWORD:}}}}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
